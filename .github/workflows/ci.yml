# LBMFlow CI — activates automatically once a remote repository is configured
# (hosting not yet decided; if not GitHub, port an equivalent workflow)
name: CI
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # LBM is ~50x slower in debug. CI must also use --release (CLAUDE.md)
      - name: Test (default features)
        run: cargo test --workspace --release
      - name: Build (gpu feature, compile-only — no GPU on runners)
        run: cargo build -p lbm-core --release --features gpu || cargo build -p lbm-core2 --release --features gpu
      - name: MPI feature
        run: |
          sudo apt-get update && sudo apt-get install -y libopenmpi-dev openmpi-bin
          (cargo build -p lbm-core --release --features mpi || cargo build -p lbm-core2 --release --features mpi)
          bash scripts/test_mpi.sh

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build GUI (tsc strict + vite)
        working-directory: web
        run: npm ci && npm run build

  heavy-validation:
    # Heavy validation (--include-ignored) runs nightly only
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Heavy validation
        run: |
          set -o pipefail
          cargo test --workspace --release -- --include-ignored 2>&1 | tee heavy-validation.log
      - name: Performance regression check
        run: |
          set -o pipefail
          if [ -f bench/baselines/ci-runner.json ]; then
            TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            cargo run --release -p lbm-core --example bench_backends -- \
              --check \
              --host-tag ci-runner \
              --timestamp "$TS" \
              2>&1 | tee bench-regression.log
          else
            mkdir -p bench
            echo "bench/baselines/ci-runner.json not found; skipping performance regression check" | tee bench-regression.log
          fi
      - name: Upload heavy validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-validation-log
          path: heavy-validation.log
      - name: Upload performance benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-benchmark-artifacts
          if-no-files-found: ignore
          path: |
            bench-regression.log
            bench/history.csv
            bench/results/*.json
