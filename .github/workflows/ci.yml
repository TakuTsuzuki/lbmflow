# LBMFlow CI — activates automatically once a remote repository is configured
# (hosting not yet decided; if not GitHub, port an equivalent workflow)
name: CI
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly heavy validation. Times are UTC.
    - cron: "17 18 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create log directory
        run: mkdir -p ci-logs
      - name: Build workspace
        run: |
          set -o pipefail
          cargo build --workspace --release 2>&1 | tee ci-logs/cargo-build-workspace-release.log
      # LBM is ~50x slower in debug. CI must also use --release (AGENTS.md / CLAUDE.md).
      - name: Test workspace
        run: |
          set -o pipefail
          cargo test --workspace --release 2>&1 | tee ci-logs/cargo-test-workspace-release.log
      - name: Upload Rust logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-logs
          path: ci-logs/
          if-no-files-found: ignore

  gpu-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create log directory
        run: mkdir -p ci-logs
      - name: Build lbm-core with gpu feature
        run: |
          set -o pipefail
          cargo build -p lbm-core --release --features gpu 2>&1 | tee ci-logs/cargo-build-lbm-core-gpu.log
      - name: Upload GPU logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-logs
          path: ci-logs/
          if-no-files-found: ignore

  mpi:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create log directory
        run: mkdir -p ci-logs
      - name: Install Open MPI
        run: |
          set -o pipefail
          sudo apt-get update 2>&1 | tee ci-logs/apt-update.log
          sudo apt-get install -y libopenmpi-dev openmpi-bin 2>&1 | tee ci-logs/apt-install-openmpi.log
      - name: Build lbm-core with mpi feature
        run: |
          set -o pipefail
          cargo build -p lbm-core --release --features mpi 2>&1 | tee ci-logs/cargo-build-lbm-core-mpi.log
      - name: Run MPI validation smoke
        run: |
          set -o pipefail
          bash scripts/test_mpi.sh 2>&1 | tee ci-logs/test-mpi.log
      - name: Upload MPI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mpi-logs
          path: ci-logs/
          if-no-files-found: ignore

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Create log directory
        run: mkdir -p ci-logs
      - name: Build GUI (tsc strict + vite)
        working-directory: web
        run: |
          set -o pipefail
          npm ci 2>&1 | tee ../ci-logs/npm-ci.log
          npm run build 2>&1 | tee ../ci-logs/npm-run-build.log
      - name: Upload web logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-logs
          path: ci-logs/
          if-no-files-found: ignore

  heavy-validation:
    # Heavy validation (--include-ignored) runs nightly only
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create log directory
        run: mkdir -p ci-logs
      - name: Test including ignored validation
        run: |
          set -o pipefail
          cargo test --workspace --release -- --include-ignored 2>&1 | tee ci-logs/cargo-test-include-ignored.log
      - name: Upload heavy validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-validation-logs
          path: ci-logs/
          if-no-files-found: ignore
